      - walkthrough/fagocitacao_light_my_fire.md
      - walkthrough/gerenciador_dispositivos.md
      - walkthrough/lavadora_e_secadora.md
      - walkthrough/ocultacao_conexao_vanilla.md
      - walkthrough/padronizacao_refrigeracao.md
      - walkthrough/patch_lks_eletricidade_construcao.md
      - walkthrough/readequacao_assets_auditoria.md
      - walkthrough/renderizacao_fluidos.md
      - walkthrough/traducao_recipientes.md
      - walkthrough/visual_termostato.md
    tags: [walkthrough, entrega, feature, documentacao-pos-entrega]
