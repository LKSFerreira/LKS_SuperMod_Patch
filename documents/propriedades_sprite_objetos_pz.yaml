# =============================================================================
# DOCUMENTAÇÃO COMPLETA: Propriedades de Sprite/Tile — Project Zomboid Build 42
# =============================================================================
#
# OBJETIVO:
#   Mapeamento detalhado de TODAS as propriedades que aparecem no PropertyContainer
#   dos sprites/tiles do jogo. Cada propriedade é documentada com:
#   - Descrição funcional em pt-BR
#   - Tipo de dado (boolean, integer, string, enum)
#   - Valores permitidos (quando aplicável)
#   - Campo Java correspondente (TilePropertyKey)
#   - Contexto de uso (onde e como o jogo utiliza)
#   - Exemplo prático
#
# FONTES:
#   - PZ-API-Docs (GitHub: PZ-Wiki-Modding/PZ-API-Docs)
#   - Código-fonte Lua do jogo (ISMoveableSpriteProps.lua, ISMoveableDefinitions.lua)
#   - Arquivo binário newtiledefinitions.tiles (análise parcial)
#   - PZwiki Tile Properties
#   - Engenharia reversa do sistema de Moveables
#
# ÚLTIMA ATUALIZAÇÃO: 2026-06-17
# AUTOR: LKS FERREIRA
# =============================================================================

# =============================================================================
# CATEGORIAS DE PROPRIEDADES:
#
#   1. IDENTIDADE E NOMEAÇÃO — Nome, grupo, tipo do objeto
#   2. POSICIONAMENTO E ORIENTAÇÃO — Facing, offsets, grid
#   3. SUPERFÍCIE E ALTURA — Surface, ItemHeight, pisos
#   4. MOVIMENTAÇÃO E COLETA — IsMoveAble, ferramentas, peso
#   5. MATERIAIS E DESMONTE — Material, scrap, repair
#   6. COLISÃO E FÍSICA — Solid, bloqueios, pathfinding
#   7. PAREDES E ESTRUTURAS — WallN, portas, janelas
#   8. CONTAINERS E ARMAZENAMENTO — Container, capacidade, sons
#   9. ILUMINAÇÃO E VISUAL — Luz, transparência, renderização
#  10. INTERAÇÃO E GAMEPLAY — Cama, cadeira, fogão, geladeira
#  11. CLIMA E AMBIENTE — Chuva, vento, neve
#  12. FLAGS (IsoFlagType) — Flags booleanas do sistema de colisão
# =============================================================================

# =============================================================================
# 1. IDENTIDADE E NOMEAÇÃO
# =============================================================================

propriedades:

  # ---------------------------------------------------------------------------
  # IDENTIDADE E NOMEAÇÃO
  # ---------------------------------------------------------------------------

  CustomName:
    campo_java: "TilePropertyKey.CUSTOM_NAME"
    tipo: string
    descricao: >
      Nome personalizado do objeto exibido no jogo. Compõe o nome final junto
      com GroupName no formato "GroupName + CustomName". Exemplo: GroupName="Fancy"
      e CustomName="Bed" resulta em "Fancy Bed" no inventário/tooltip.
    contexto: >
      Usado pelo sistema de Moveables para exibir o nome do objeto quando o
      jogador interage (pegar, colocar, inspecionar). Deve ser idêntico em
      todos os tiles de objetos multi-tile.
    exemplo: "Bed"
    observacao: "Se ausente, o objeto aparece como 'Moveable object'"

  GroupName:
    campo_java: "TilePropertyKey.GROUP_NAME"
    tipo: string
    descricao: >
      Prefixo descritivo do objeto — geralmente indica cor, estilo ou qualidade.
      Exibido antes do CustomName formando o nome completo do objeto.
    contexto: >
      Subcategoria visual. Valores comuns: "Red", "Blue", "White", "Fancy",
      "Modern", "Old". Usado para diferenciar variações visuais do mesmo objeto.
    exemplo: "Red"
    observacao: >
      Responde à pergunta "por que GroupName = Red?" — é a variante de cor/estilo
      desse sprite específico dentro da mesma família de objetos.

  CustomItem:
    campo_java: "TilePropertyKey.CUSTOM_ITEM"
    tipo: string
    descricao: >
      ID completo do item que este tile representa quando coletado. Sobrescreve
      o item genérico de moveable com um item específico definido em scripts.
    contexto: >
      Quando presente, o sistema de moveables usa este item em vez do genérico.
      Nome, peso e propriedades vêm do item definido em scripts/items.txt.
      Exemplos: rádios, TVs e jukeboxes que retornam itens específicos.
    exemplo: "Radio.HamRadio"
    valores_comuns:
      - "Radio.HamRadio"
      - "Radio.CDplayer"

  IsoType:
    campo_java: "TilePropertyKey.ISO_TYPE"
    tipo: enum
    descricao: >
      Classe Java que o tile instancia no mundo. Define comportamentos e
      interações específicos do objeto. IsoObject é o padrão genérico.
    contexto: >
      Determina qual classe Java gerencia o objeto — cada tipo tem lógica
      própria (temperatura, energia, lavagem, música, etc).
    padrao: "IsoObject"
    valores_permitidos:
      - valor: "IsoObject"
        significado: "Objeto genérico sem comportamento especial"
      - valor: "IsoBarbecue"
        significado: "Churrasqueira — pode ser acesa e cozinhar"
      - valor: "IsoBrokenGlass"
        significado: "Vidro quebrado no chão — causa dano ao pisar"
      - valor: "IsoClothingDryer"
        significado: "Secadora de roupas — seca roupas molhadas"
      - valor: "IsoClothingWasher"
        significado: "Lavadora de roupas — lava roupas sujas"
      - valor: "IsoCombinationWasherDryer"
        significado: "Lava-e-seca combinado — lava e seca em um aparelho"
      - valor: "IsoFireplace"
        significado: "Lareira — aquece o ambiente, pode ser acesa"
      - valor: "IsoMannequin"
        significado: "Manequim — pode vestir roupas para exibição"
      - valor: "IsoRadio"
        significado: "Rádio — reproduz transmissões e música"
      - valor: "IsoJukebox"
        significado: "Jukebox — reproduz música ambiente"
      - valor: "IsoStove"
        significado: "Fogão/Forno — cozinha alimentos, requer energia"
      - valor: "IsoTelevision"
        significado: "Televisão — exibe programas, entretenimento"
      - valor: "IsoMultiMedia"
        significado: "Multimídia — reproduz mídias diversas"

  name:
    campo_java: "TilePropertyKey.NAME"
    tipo: string
    descricao: "Nome interno do sprite/tile no sistema."
    contexto: "Identificador interno, raramente visível ao jogador."

  # ---------------------------------------------------------------------------
  # 2. POSICIONAMENTO E ORIENTAÇÃO
  # ---------------------------------------------------------------------------

  Facing:
    campo_java: "TilePropertyKey.FACING"
    tipo: enum
    descricao: >
      Direção para a qual a FRENTE do objeto aponta. Atenção: NÃO é a orientação
      do sprite, mas sim para onde o lado frontal está "olhando". Se Facing="S",
      significa que o tile tem orientação Norte e sua frente olha para o Sul.
    contexto: >
      Base para o sistema de rotação de moveables. Junto com os offsets (Noffset,
      Woffset, etc), permite que o jogo encontre os sprites de todas as rotações.
      Referencial isométrico: Norte = canto superior direito, Oeste = canto superior esquerdo.
    valores_permitidos:
      - valor: "N"
        significado: "Frente apontando para Norte (canto superior direito)"
      - valor: "S"
        significado: "Frente apontando para Sul (canto inferior esquerdo)"
      - valor: "E"
        significado: "Frente apontando para Leste (canto inferior direito)"
      - valor: "W"
        significado: "Frente apontando para Oeste (canto superior esquerdo)"
    exemplo: "S"

  Noffset:
    campo_java: "TilePropertyKey.N_OFFSET"
    tipo: integer
    descricao: >
      Delta de índice no spritesheet para obter a versão virada para Norte.
      O valor é somado ao spriteID base para encontrar o sprite rotacionado.
    contexto: >
      NÃO é um offset em pixels! É o deslocamento numérico dentro do atlas
      de sprites. Exemplo: se o sprite base é "furniture_01_5" (ID 5) e
      Noffset=2, o sprite Norte será "furniture_01_7" (ID 5+2=7).
    padrao: 0
    exemplo: 2
    observacao: "Valor 0 significa que não existe sprite para essa direção"

  Soffset:
    campo_java: "TilePropertyKey.S_OFFSET"
    tipo: integer
    descricao: >
      Delta de índice no spritesheet para obter a versão virada para Sul.
      Funciona identicamente ao Noffset mas para a direção Sul.
    padrao: 0
    exemplo: -2

  Woffset:
    campo_java: "TilePropertyKey.W_OFFSET"
    tipo: integer
    descricao: >
      Delta de índice no spritesheet para obter a versão virada para Oeste.
      Funciona identicamente ao Noffset mas para a direção Oeste.
    contexto: >
      Responde à pergunta "Woffset = 2, que porra é isso?" — significa que para
      ver este objeto virado para Oeste, soma-se 2 ao ID base do sprite.
    padrao: 0
    exemplo: 2

  Eoffset:
    campo_java: "TilePropertyKey.E_OFFSET"
    tipo: integer
    descricao: >
      Delta de índice no spritesheet para obter a versão virada para Leste.
      Funciona identicamente ao Noffset mas para a direção Leste.
    padrao: 0
    exemplo: -2

  LinkedOffset:
    campo_java: "TilePropertyKey.LINKED_OFFSET"
    tipo: integer
    descricao: >
      Offset para sprite vinculado (parte de objeto multi-tile). Indica a
      distância em índice de sprite até o tile parceiro na mesma grade.
    padrao: 0
    contexto: "Usado para objetos compostos de múltiplos tiles (sofás, mesas grandes)."

  LinkedLocIs:
    campo_java: "TilePropertyKey.LINKED_LOC_IS"
    tipo: string
    descricao: >
      Direção onde está o tile parceiro vinculado. Indica a posição relativa
      do outro tile que forma parte do mesmo objeto multi-tile.
    contexto: "Para um sofá de 2 tiles, um deles terá LinkedLocIs='E' indicando que o parceiro está a Leste."
    valores_comuns:
      - "N"
      - "S"
      - "E"
      - "W"

  SpriteGridPos:
    campo_java: "TilePropertyKey.SPRITE_GRID_POS"
    tipo: string
    descricao: >
      Posição que este tile ocupa dentro de objetos multi-tile. Formato "X,Y"
      onde X cresce para sudeste e Y cresce para sudoeste (visão isométrica).
    contexto: "Para mesas 2x2, os tiles teriam posições: 0,0 / 1,0 / 0,1 / 1,1"
    exemplo: "0,1"

  SpriteGridLevel:
    campo_java: "TilePropertyKey.SPRITE_GRID_LEVEL"
    tipo: integer
    descricao: "Nível vertical no grid de sprites (para objetos com múltiplos andares)."

  # ---------------------------------------------------------------------------
  # 3. SUPERFÍCIE E ALTURA
  # ---------------------------------------------------------------------------

  Surface:
    campo_java: "TilePropertyKey.SURFACE"
    tipo: integer
    descricao: >
      Altura em pixels da superfície plana do objeto. Define onde itens serão
      colocados "em cima" do objeto (mesas, bancadas, prateleiras).
    contexto: >
      Quando o jogador coloca um item sobre uma mesa, o jogo usa este valor
      para posicionar o item visualmente na altura correta. Valor 0 = nível
      do chão. Valores maiores = mais alto. Uma mesa típica tem Surface=32.
    padrao: 0
    exemplo: 32
    observacao: >
      Quando IsSurfaceOffset=true, Surface passa a indicar a altura da BASE
      do objeto (útil para objetos colocados sobre outros, como vasos de flores).

  IsSurfaceOffset:
    campo_java: "TilePropertyKey.IS_SURFACE_OFFSET"
    tipo: boolean
    descricao: >
      Quando true, inverte o significado de Surface: em vez de indicar a altura
      da superfície, passa a indicar a altura da BASE (fundo) do tile.
    contexto: >
      Usado para objetos que ficam sobre outros (abajur sobre mesa, vaso sobre
      balcão). O ItemHeight passa a indicar a superfície e Surface indica o offset base.
    padrao: false

  ItemHeight:
    campo_java: "TilePropertyKey.ITEM_HEIGHT"
    tipo: integer
    descricao: >
      Altura da superfície própria de um tile que usa IsSurfaceOffset. Quando
      um objeto tem IsSurfaceOffset=true, ItemHeight define onde itens podem
      ser colocados em cima DESTE objeto.
    contexto: >
      Complementa Surface+IsSurfaceOffset. Exemplo: um abajur sobre uma mesa —
      Surface indica onde o abajur "encaixa" na mesa, ItemHeight indica se algo
      pode ser colocado em cima do abajur.
    padrao: 0

  IsTable:
    campo_java: "TilePropertyKey.IS_TABLE"
    tipo: boolean
    descricao: "Trata este tile como superfície de mesa. Permite colocar itens sobre ele."
    contexto: "Ativa lógica de posicionamento de itens na superfície."

  IsTableTop:
    campo_java: "TilePropertyKey.IS_TABLE_TOP"
    tipo: boolean
    descricao: "Permite que outros tiles/objetos sejam empilhados sobre este."
    contexto: "Similar a IsTable mas para empilhamento de objetos móveis."

  halfheight:
    campo_java: "TilePropertyKey.HALF_HEIGHT"
    tipo: boolean
    descricao: "Indica que o tile ocupa apenas metade da altura padrão."

  IsHigh:
    campo_java: "TilePropertyKey.IS_HIGH"
    tipo: boolean
    descricao: >
      Tile ocupa apenas a METADE SUPERIOR do espaço vertical. Exemplos típicos:
      quadros na parede, prateleiras suspensas, relógios de parede.
    contexto: >
      Responde à pergunta "IsHigh?" — um quadro na parede é IsHigh porque
      ocupa a parte de cima do tile, permitindo objetos baixos no mesmo espaço.

  IsLow:
    campo_java: "TilePropertyKey.IS_LOW"
    tipo: boolean
    descricao: >
      Tile ocupa apenas a METADE INFERIOR do espaço vertical. Exemplos típicos:
      camas, bancadas baixas, mesas de centro.
    contexto: >
      Responde à pergunta "IsLow?" — uma cama é IsLow porque ocupa apenas
      a parte baixa do tile, permitindo prateleiras altas no mesmo quadrado.
      Objetos IsLow podem coexistir com objetos IsHigh no mesmo tile.

  IsStackable:
    campo_java: "TilePropertyKey.IS_STACKABLE"
    tipo: boolean
    descricao: "Permite empilhar múltiplas instâncias deste objeto verticalmente."

  FloorHeight:
    campo_java: "TilePropertyKey.FLOOR_HEIGHT"
    tipo: integer
    descricao: "Altura do piso definida por este tile (para pisos elevados)."

  FloorHeightOneThird:
    campo_java: "TilePropertyKey.FLOOR_HEIGHT_ONE_THIRD"
    tipo: boolean
    descricao: "Piso com altura de 1/3 da altura padrão."

  FloorHeightTwoThirds:
    campo_java: "TilePropertyKey.FLOOR_HEIGHT_TWO_THIRDS"
    tipo: boolean
    descricao: "Piso com altura de 2/3 da altura padrão."

  IgnoreSurfaceSnap:
    campo_java: "TilePropertyKey.IGNORE_SURFACE_SNAP"
    tipo: boolean
    descricao: >
      Quando true, o objeto ignora o snap automático à superfície abaixo dele.
      Permite posicionamento livre em vez de encaixar na mesa/balcão.
    contexto: "Usado para objetos que devem ficar no chão mesmo quando há superfície disponível."

  # ---------------------------------------------------------------------------
  # 4. MOVIMENTAÇÃO E COLETA
  # ---------------------------------------------------------------------------

  IsMoveAble:
    campo_java: "TilePropertyKey.IS_MOVE_ABLE"
    tipo: boolean
    descricao: >
      Marca o tile como móvel — o jogador pode pegá-lo e reposicioná-lo.
      Quando true, o objeto gera um item de inventário do tipo "moveable".
    contexto: >
      Ativa todo o sistema de moveables: o objeto aparece no modo "pegar móvel"
      e pode ser carregado, rotacionado e recolocado pelo jogador.

  isMoveAbleObject:
    campo_java: "TilePropertyKey.IS_MOVE_ABLE_OBJECT"
    tipo: boolean
    descricao: "Variante de IsMoveAble para objetos compostos."

  MoveType:
    campo_java: "TilePropertyKey.MOVE_TYPE"
    tipo: enum
    descricao: >
      Subtipo de objeto móvel. Afeta principalmente o ícone exibido no inventário
      e, no caso de WallObject, altera ligeiramente a física de colisão.
    padrao: "Object"
    valores_permitidos:
      - valor: "Normal"
        significado: "Objeto padrão"
      - valor: "WallObject"
        significado: "Objeto fixado na parede (quadro, relógio, prateleira)"
      - valor: "WindowObject"
        significado: "Objeto de janela (cortina, persiana)"
      - valor: "Window"
        significado: "A própria janela"
      - valor: "FloorTile"
        significado: "Piso decorativo removível"
      - valor: "FloorRug"
        significado: "Tapete"
      - valor: "Vegitation"
        significado: "Vegetação (plantas decorativas)"
      - valor: "WallOverlay"
        significado: "Overlay sobre parede (papel de parede, pintura) — atribuído automaticamente"

  PickUpTool:
    campo_java: "TilePropertyKey.PICK_UP_TOOL"
    tipo: enum
    descricao: >
      Ferramenta necessária para o jogador pegar/desmontar este objeto.
      Cada ferramenta está associada a uma habilidade (perk) específica.
    contexto: >
      "None" ou ausência = pode pegar com as mãos. Cada ferramenta mapeia
      para itens específicos e uma habilidade associada.
    valores_permitidos:
      - valor: "None"
        significado: "Sem ferramenta necessária (mãos livres)"
      - valor: "Hammer"
        significado: "Martelo — requer Base.Hammer — habilidade: Carpintaria"
      - valor: "Crowbar"
        significado: "Pé de cabra — requer Tag.Crowbar — habilidade: Carpintaria"
      - valor: "Electrician"
        significado: "Chave de fenda — requer Base.Screwdriver — habilidade: Eletricidade"
      - valor: "Cutter"
        significado: "Faca/tesoura — requer Tag.SharpKnife ou Tag.Scissors — habilidade: Carpintaria"
      - valor: "Shovel"
        significado: "Pá — requer Base.Shovel — habilidade: Agricultura"
      - valor: "Wrench"
        significado: "Chave inglesa — requer Base.Wrench ou Base.PipeWrench — sem habilidade"
      - valor: "Metal"
        significado: "Chave de fenda (metal) — requer Base.Screwdriver — habilidade: Metalurgia"
      - valor: "Screwdriver"
        significado: "Chave de fenda — requer Base.Screwdriver — habilidade: Carpintaria"

  PlaceTool:
    campo_java: "TilePropertyKey.PLACE_TOOL"
    tipo: enum
    descricao: "Ferramenta necessária para COLOCAR o objeto de volta no mundo."
    contexto: "Mesmos valores que PickUpTool. Se ausente, pode ser colocado sem ferramenta."
    valores_permitidos: "Mesmos valores de PickUpTool"

  PickUpLevel:
    campo_java: "TilePropertyKey.PICK_UP_LEVEL"
    tipo: integer
    descricao: >
      Nível mínimo na habilidade associada à PickUpTool para poder pegar o objeto.
      Exemplo: PickUpTool="Hammer" com PickUpLevel=3 exige Carpintaria nível 3.
    contexto: >
      Responde à pergunta "PickUpLevel = 3, que significa?" — o jogador precisa
      ter nível 3 na habilidade relevante (determinada pela PickUpTool) para
      conseguir pegar/desmontar este objeto.
    padrao: 0
    exemplo: 3

  PickUpWeight:
    campo_java: "TilePropertyKey.PICK_UP_WEIGHT"
    tipo: integer
    descricao: >
      Peso bruto do objeto (dividido por 10 para encumbrance no inventário).
      Exemplo: PickUpWeight=200 resulta em peso 20.0 no inventário.
      Também influencia o tempo da ação de pegar (mais pesado = mais lento).
    contexto: "Se ForceSingleItem=true, é o peso total. Senão, peso de cada tile individual."
    padrao: 50
    exemplo: 200
    formula: "peso_inventario = PickUpWeight / 10"

  CanBreak:
    campo_java: "TilePropertyKey.CAN_BREAK"
    tipo: boolean
    descricao: >
      O objeto pode quebrar ao ser pego. A chance de quebra diminui conforme
      o nível na habilidade associada (PickUpLevel) aumenta.
    contexto: "Só funciona se PickUpTool estiver definido. Sem ferramenta, não pode quebrar."

  ForceSingleItem:
    campo_java: "TilePropertyKey.FORCE_SINGLE_ITEM"
    tipo: boolean
    descricao: >
      Força objetos multi-tile a serem um único item no inventário em vez de
      gerar um item por tile. O PickUpWeight será o peso total.
    contexto: "Exemplo: um sofá de 3 tiles vira 1 item 'Sofá' em vez de 3 peças separadas."

  IsClosedState:
    campo_java: "TilePropertyKey.IS_CLOSED_STATE"
    tipo: boolean
    descricao: >
      Indica que o sprite atual é o estado FECHADO do objeto. Usado para
      objetos que alternam entre aberto/fechado (janelas, portas, armários).
    contexto: "O sistema de moveables usa isso para gerenciar troca de sprites ao abrir/fechar."

  WallObjectAllowDoorframe:
    campo_java: "TilePropertyKey.WALL_OBJECT_ALLOW_DOORFRAME"
    tipo: boolean
    descricao: "Permite que este objeto de parede seja colocado em batentes de porta."

  IsGridExtensionTile:
    campo_java: "TilePropertyKey.IS_GRID_EXTENSION_TILE"
    tipo: boolean
    descricao: >
      Marca como tile de extensão de grid — parte de um objeto multi-tile
      que estende o grid base mas não é o tile principal.

  # ---------------------------------------------------------------------------
  # 5. MATERIAIS E DESMONTE
  # ---------------------------------------------------------------------------

  Material:
    campo_java: "TilePropertyKey.MATERIAL"
    tipo: string
    descricao: >
      Material primário do objeto. Determina quais itens são retornados ao
      desmontar/sucatear e a saúde/resistência do objeto.
    contexto: >
      Cada material mapeia para itens de retorno definidos em ISMoveableDefinitions.
      O material também afeta o som ao ser atingido e a ferramenta ideal.
    valores_conhecidos:
      - valor: "Wood"
        retorno: "Base.Plank (até 3), Base.Nails (até 1)"
      - valor: "Log"
        retorno: "Base.Log (até 3)"
      - valor: "Steel"
        retorno: "Base.Screws (até 3)"
      - valor: "Plumbing"
        retorno: "Base.Screws (até 3)"
      - valor: "Electric"
        retorno: "Base.Screws (até 3)"
      - valor: "Fabric"
        retorno: "Base.Thread (até 1), Base.RippedSheets (até 3), Base.Sheet (até 1)"
      - valor: "Leather"
        retorno: "Base.Thread (até 1), Base.LeatherStrips (até 3)"
      - valor: "Natural"
        retorno: "Base.Twigs (até 3)"
      - valor: "Brick"
        retorno: "Base.ClayBrick (até 3)"
      - valor: "Plastic"
        retorno: "(ainda não implementado no jogo)"

  Material2:
    campo_java: "TilePropertyKey.MATERIAL_2"
    tipo: string
    descricao: "Material secundário — retorna itens adicionais ao desmontar."
    contexto: "Valores 'Undefined' são ignorados. Mesma lista de materiais que Material."

  Material3:
    campo_java: "TilePropertyKey.MATERIAL_3"
    tipo: string
    descricao: "Material terciário — retorna ainda mais itens ao desmontar."
    contexto: "Valores 'Undefined' são ignorados. Mesma lista de materiais que Material."

  MaterialType:
    campo_java: "TilePropertyKey.MATERIAL_TYPE"
    tipo: string
    descricao: >
      Tipo de material para efeitos de som, partículas e dano. Diferente de
      Material (que é para sistema de desmonte/craft). MaterialType afeta a
      física e feedback sensorial ao interagir/destruir.
    valores_conhecidos:
      - "Metal_Large"
      - "Metal_Small"
      - "Metal_Sheet"
      - "Metal_Bar"
      - "Metal_Wire"
      - "Wood_Large"
      - "Wood_Small"
      - "Wood_Bar"
      - "Wood_Stairs"
      - "Carpet"
      - "Glass"
      - "Stone"
      - "Tile"
      - "Water"
      - "Dirt"
      - "Concrete"

  CanScrap:
    campo_java: "TilePropertyKey.CAN_SCRAP"
    tipo: boolean
    descricao: >
      Objeto pode ser sucateado (desmontado para materiais). Requer que
      Material esteja definido e não seja "Undefined".
    contexto: "Se CanScrap=true mas Material é inválido, o jogo força CanScrap=false."

